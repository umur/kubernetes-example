apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: catalog-service
  namespace: cinetrack
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
  updatePolicy:
    updateMode: "Auto"       # Recreate pods with new requests on change
  resourcePolicy:
    containerPolicies:
      - containerName: catalog-service
        minAllowed:
          cpu: 100m
          memory: 128Mi
        maxAllowed:
          cpu: 2
          memory: 2Gi
        controlledResources: ["cpu", "memory"]
