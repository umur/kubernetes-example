apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-load-test
  namespace: cinetrack
data:
  load-test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      stages: [
        { duration: '2m', target: 50  },   // ramp up
        { duration: '5m', target: 50  },   // steady state
        { duration: '2m', target: 100 },   // double load
        { duration: '5m', target: 100 },   // hold
        { duration: '2m', target: 0   },   // ramp down
      ],
      thresholds: {
        http_req_duration: ['p(95)<500'],    // 95th percentile under 500 ms
        http_req_failed:   ['rate<0.01'],    // error rate under 1%
      },
    };

    const BASE = __ENV.BASE_URL || 'http://catalog-service.cinetrack.svc.cluster.local:8080';

    export default function () {
      const res = http.get(`${BASE}/api/catalog/movies?page=0&size=20`);
      check(res, {
        'status 200': (r) => r.status === 200,
        'body not empty': (r) => r.body.length > 0,
      });
      sleep(1);
    }
