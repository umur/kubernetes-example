apiVersion: batch/v1
kind: Job
metadata:
  name: k6-capacity-test
  namespace: cinetrack
spec:
  template:
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          args: ["run", "/scripts/load-test.js"]
          env:
            - name: BASE_URL
              value: "http://catalog-service.cinetrack.svc.cluster.local:8080"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: k6-load-test
      restartPolicy: Never
  backoffLimit: 0
