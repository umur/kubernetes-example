apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cinetrack
bases:
  - ../../base
patches:
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
    target:
      kind: Deployment
      name: catalog-service
