apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: cinetrack
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
        app.kubernetes.io/part-of: cinetrack
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: catalog-service
      containers:
        - name: catalog-service
          image: ghcr.io/umur/cinetrack-catalog-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:MaxRAMPercentage=75.0
                -XX:+UseContainerSupport
                -XX:+UseZGC
                -XX:+ZGenerational
                -Djdk.virtualThreadScheduler.parallelism=32
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: 1
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 3
