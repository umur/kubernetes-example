apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cinetrack
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None   # headless service for StatefulSet DNS
---
apiVersion: v1
kind: Service
metadata:
  name: redis-client
  namespace: cinetrack
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
