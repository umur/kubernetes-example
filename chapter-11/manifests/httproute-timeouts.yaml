apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-route-resilient
  namespace: cinetrack
spec:
  parentRefs:
    - name: cinetrack-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/catalog
      timeouts:
        request: 5s
        backendRequest: 3s
      # Note: HTTPRoute retry policy is configured via vendor-specific annotations
      # on the parent Gateway or via a RetryFilter (experimental channel only).
      # For production retries use Nginx Ingress annotations or a service mesh.
      backendRefs:
        - name: catalog-service
          port: 8080
