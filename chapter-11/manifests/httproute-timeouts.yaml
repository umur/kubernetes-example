apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-route-resilient
  namespace: cinetrack
spec:
  parentRefs:
    - name: cinetrack-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/catalog
      timeouts:
        request: 5s
        backendRequest: 3s
      retry:
        codes: [503, 504]
        attempts: 3
        backoff: 250ms
      backendRefs:
        - name: catalog-service
          port: 8080
