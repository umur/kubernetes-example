# FIXED: PDB ensures 1 pod always available; minReadySeconds prevents too-fast rollout
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalog-service
  namespace: cinetrack
  annotations:
    incident: "04-eviction"
    state: "after-fix"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: cinetrack
spec:
  replicas: 2
  minReadySeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # never go below desired: surge only
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/umur/cinetrack-catalog-service:latest
          ports: [{containerPort: 8080}]
          resources:
            requests: {memory: 256Mi, cpu: 250m}
            limits: {memory: 512Mi, cpu: 500m}
