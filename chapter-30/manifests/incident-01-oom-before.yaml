# BROKEN: no memory limit → JVM takes all node memory → OOMKilled by kubelet
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: cinetrack
  annotations:
    incident: "01-oom"
    state: "before-fix"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/umur/cinetrack-catalog-service:latest
          ports:
            - containerPort: 8080
          # BUG: no resources block → JVM ignores container memory → node OOM
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
