apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cinetrack-postgres
  namespace: cinetrack
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      maintenance_work_mem: "64MB"
      wal_level: logical

  bootstrap:
    initdb:
      database: cinetrack
      owner: cinetrack_user
      secret:
        name: cinetrack-postgres-credentials

  storage:
    size: 10Gi
    storageClass: standard

  backup:
    barmanObjectStore:
      destinationPath: s3://cinetrack-postgres-backups/
      s3Credentials:
        accessKeyId:
          name: s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: s3-creds
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
    retentionPolicy: 30d

  monitoring:
    enablePodMonitor: true
