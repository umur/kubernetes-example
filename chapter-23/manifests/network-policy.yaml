# Default deny all ingress within cinetrack-backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: cinetrack-backend
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
# Allow ingress only from same namespace + monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: cinetrack-backend
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              team: backend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
