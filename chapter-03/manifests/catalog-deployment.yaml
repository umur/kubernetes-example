apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: cinetrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-service
        app.kubernetes.io/part-of: cinetrack
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/umur/cinetrack-catalog-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              # Container-aware heap: 75% of cgroup memory limit → 384 MiB of 512 MiB
              value: >-
                -XX:MaxRAMPercentage=75.0
                -XX:InitialRAMPercentage=50.0
                -XX:+UseContainerSupport
                -XX:+UseZGC
                -Xlog:gc*:stdout:time,level,tags
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              memory: 384Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
