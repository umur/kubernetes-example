apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: catalog-service
  namespace: cinetrack
  labels:
    strimzi.io/cluster: cinetrack-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: watch-logged
          patternType: literal
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: catalog-service
          patternType: prefix
        operations: [Read]
        host: "*"
