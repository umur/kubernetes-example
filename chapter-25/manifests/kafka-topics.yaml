apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: watch-logged
  namespace: cinetrack
  labels:
    strimzi.io/cluster: cinetrack-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000    # 7 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: review-created
  namespace: cinetrack
  labels:
    strimzi.io/cluster: cinetrack-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: notification-requested
  namespace: cinetrack
  labels:
    strimzi.io/cluster: cinetrack-kafka
spec:
  partitions: 3
  replicas: 3
