apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: cinetrack
spec:
  amiFamily: AL2023
  role: KarpenterNodeRole-cinetrack-prod
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: cinetrack-prod
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: cinetrack-prod
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        iops: 3000
        encrypted: true
