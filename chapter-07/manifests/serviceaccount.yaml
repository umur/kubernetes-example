    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/cinetrack-catalog-service
    # GKE Workload Identity equivalent:
    # iam.gke.io/gcp-service-account: catalog-service@PROJECT.iam.gserviceaccount.com
