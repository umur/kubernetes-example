apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-sbom-attestation
spec:
  validationFailureAction: Audit
  rules:
    - name: check-sbom
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cinetrack]
      verifyImages:
        - imageReferences:
            - "ghcr.io/umur/cinetrack-*"
          mutateDigest: false   # must be false when failureAction is Audit
          attestations:
            - predicateType: https://spdx.dev/Document
              attestors:
                - entries:
                    - keyless:
                        subject: "https://github.com/umur/kubernetes-example/.github/workflows/release.yml@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
